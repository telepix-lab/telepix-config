name: Publish Packages

on:
  push:
    branches:
      - main
    paths:
      - "packages/**/package.json"
      - "packages/**/src/**"
      - "packages/**/index.*"
      - ".github/workflows/publish.yml"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1 # 프로젝트 버전에 맞춰 설정

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        # 각 패키지의 build 스크립트가 있다면 실행
        # eslint-config 등 빌드가 필요한 패키지가 있으므로 재귀적 빌드 실행
        run: pnpm run -r build --if-present

      - name: Publish to npm
        # pnpm publish -r 옵션은 레지스트리에 이미 배포된 버전을 자동으로 건너뛰고 새 버전만 배포합니다.
        # --provenance 옵션을 통해 Trusted Publishing (OIDC) 토큰 기반 인증을 수행합니다.
        run: pnpm publish -r --access public --no-git-checks --provenance
